<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Weather Wall Display</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="dashboard">
      <section class="top-row">
        <article class="clock-card card">
          <p class="label">Current Time</p>
          <p id="current-time" class="time">--:--:--</p>
          <p id="current-date" class="date">Loading date...</p>
        </article>

        <article class="weather-card card">
          <p class="label">Current Weather</p>
          <div class="weather-main">
            <p id="current-icon" class="weather-icon" aria-hidden="true">--</p>
            <div>
              <p id="current-temp" class="temp">--°</p>
              <p id="current-summary" class="summary">Loading current conditions...</p>
            </div>
          </div>
          <p id="last-updated" class="meta">Last updated: --</p>
          <p id="location-name" class="meta">Location: --</p>
          <p id="source-name" class="meta">Source: --</p>
        </article>
      </section>

      <section class="forecast-section card">
        <p class="label">Next 8 Hours</p>
        <div id="hourly-forecast" class="forecast-row" aria-live="polite"></div>
      </section>

      <section class="forecast-section card">
        <p class="label">Next 5 Days</p>
        <div id="daily-forecast" class="forecast-row daily-row" aria-live="polite"></div>
      </section>

      <p id="status" class="status" role="status" aria-live="polite"></p>
    </main>

    <script src="./app.js"></script>
  </body>
  </html>
